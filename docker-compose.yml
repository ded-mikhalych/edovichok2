services:
  postgres:
    image: postgres:16-alpine
    container_name: recipes-db
    environment:
      POSTGRES_USER: recipes_user
      POSTGRES_PASSWORD: recipes_password_123
      POSTGRES_DB: RecipesDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipes_user -d RecipesDb"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: recipes-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recipes-app
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=RecipesDb;Username=recipes_user;Password=recipes_password_123;"
    ports:
      - "5150:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
